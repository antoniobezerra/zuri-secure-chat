services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zuri_chat
      POSTGRES_USER: zuri_chat
      POSTGRES_PASSWORD: zuri_chat
    ports:
      - "127.0.0.1:5544:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuri_chat -d zuri_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6388:6379"
    volumes:
      - redis-data:/data

  chat-relay:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    environment:
      CHAT_RELAY_PORT: 4088
      DATABASE_URL: postgresql://zuri_chat:zuri_chat@postgres:5432/zuri_chat
      METRICS_SALT: local-docker-metrics-salt
      HASH_PEPPER: ${HASH_PEPPER:-local-docker-hash-pepper}
      INVITE_TTL_SECONDS: ${INVITE_TTL_SECONDS:-600}
      INVITE_ONE_TIME: ${INVITE_ONE_TIME:-true}
      INVITE_MAX_ATTEMPTS: ${INVITE_MAX_ATTEMPTS:-5}
      TOKEN_BYTES: ${TOKEN_BYTES:-32}
      LOG_QUERY_STRING: ${LOG_QUERY_STRING:-false}
      MESSAGE_TTL_DAYS: 30
      DELIVERED_DELETE_IMMEDIATELY: ${DELIVERED_DELETE_IMMEDIATELY:-true}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-90}
      IP_LOG_RETENTION_HOURS: ${IP_LOG_RETENTION_HOURS:-24}
      MAX_WEBSOCKET_PAYLOAD_BYTES: ${MAX_WEBSOCKET_PAYLOAD_BYTES:-524288}
      MAX_MESSAGE_BYTES: ${MAX_MESSAGE_BYTES:-262144}
      MAX_PENDING_MESSAGES_PER_QUEUE: ${MAX_PENDING_MESSAGES_PER_QUEUE:-500}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_EVENTS: ${RATE_LIMIT_MAX_EVENTS:-120}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-zuri-demo-admin}
    ports:
      - "4088:4088"
    depends_on:
      postgres:
        condition: service_healthy

  retention-worker:
    build:
      context: ..
      dockerfile: apps/retention-worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://zuri_chat:zuri_chat@postgres:5432/zuri_chat
      METRICS_SALT: local-docker-metrics-salt
      RETENTION_INTERVAL_MS: 60000
    depends_on:
      postgres:
        condition: service_healthy

  chat-demo-web:
    build:
      context: ..
      dockerfile: apps/demo-web/Dockerfile
    ports:
      - "5177:5177"
    depends_on:
      - chat-relay

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - chat-demo-web
      - chat-relay

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
